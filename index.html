<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dale Bendixen || Developer</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <img
        src="./images/portfolio header img.jpg"
        class="header-image"
        alt="img-header"
      />
      <!-- HTML MODAL -->
      <div class="html-modal">
        <img
          class="html-img"
          src="./images/web-development-fundamentals-bootcamp.jpg"
        />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn-html"></i>
        </div>
      </div>
      <!-- JAVASCRIPT MODAl -->
      <div class="javascript-modal">
        <img
          class="javascript-img"
          src="./images/front-end-certificate-honor.jpg"
        />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn close-btn-javascript"></i>
        </div>
      </div>
      <!-- BOOTSTRAP MODAl -->
      <div class="bootstrap-modal">
        <img
          class="bootstrap-img"
          src="./images/front-end-web-development-bootstrap.jpg"
        />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn close-btn-bootstrap"></i>
        </div>
      </div>
      <!-- PYTHON MODAl -->
      <div class="python-modal">
        <img
          class="python-img"
          src="./images/Backend-sql-dev-ops-python-bootcamp .jpg"
        />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn close-btn-python"></i>
        </div>
      </div>
      <!-- SQL MODAl -->
      <div class="sql-modal">
        <img class="sql-img" src="./images/sql-data-modeling-with-python.jpg" />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn close-btn-sql"></i>
        </div>
      </div>
      <!-- REACT MODAl -->
      <div class="react-modal">
        <img
          class="react-img"
          src="./images/front-end-web-development-react.jpg"
        />
        <img class="react-img" src="./images/react-native.jpg" />
        <div class="close-container">
          <i class="fa-solid fa-xmark close-btn close-btn-react"></i>
        </div>
      </div>

      <!-- NAVBAR ONE START -->
      <navbar class="nav-bar-container">
        <nav class="nav-icon">
          <i class="fa-brands fa-html5" id="html-icon"></i>
          <i class="fa-brands fa-js" id="javascript-icon"></i>
          <i class="fa-brands fa-bootstrap" id="bootstrap-icon"></i>
          <i class="fa-brands fa-python" id="python-icon"></i>
          <i class="fa-solid fa-database" id="sql-icon"></i>
          <i class="fa-brands fa-react" id="react-icon"></i>
        </nav>
      </navbar>
      <!-- NAVBAR ONE END -->
      <!-- ------------------------------------------------------------------------------- -->
      <div class="nav-two">
        <a href="./about.html">About Me</a>
        <a href="https://github.com/Irond76" target="_blank">Git Hub</a>
      </div>
    </div>
  </body>
  <script src="./index.js"></script>
</html>
